apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging-saldo
resources:
  - ../base
patches:
  - path: deployment.yml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: saldo-dep
  - path: ingress.yml
    target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: saldo-ing
images:
  - name: IMAGES/APP
    newName: tomjtoth/saldo:1.0.5
