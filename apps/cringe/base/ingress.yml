apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: cringe-ws-ing
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: cringe.ttj.hu
      http:
        paths:
          - path: /api/ws
            pathType: Prefix
            backend:
              service:
                name: cringe-svc
                port:
                  number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: cringe-ing

spec:
  ingressClassName: nginx
  rules:
    - host: cringe.ttj.hu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cringe-svc
                port:
                  number: 80
